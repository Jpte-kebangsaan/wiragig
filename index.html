<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiraGig - Hub Kebajikan Pekerja Gig Malaysia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .bar-transition { transition: height 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 gradient-bg rounded-lg flex items-center justify-center text-white font-bold text-xl">W</div>
                <h1 class="font-bold text-xl text-indigo-900 tracking-tight">WiraGig</h1>
            </div>
            <div class="w-10 h-10 rounded-full bg-slate-200 border-2 border-indigo-100 overflow-hidden shadow-inner">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Adam" alt="Avatar">
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <section>
            <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Selamat Pagi, Wira AN!</h2>
            <p class="text-slate-500 text-sm">Status kebajikan anda nampak mantap hari ini.</p>
        </section>

        <section id="rankCard" class="bg-indigo-900 p-5 rounded-3xl shadow-lg relative overflow-hidden transition-all duration-500">
            <div class="relative z-10 flex items-center justify-between text-white">
                <div>
                    <span id="rankBadge" class="bg-indigo-500 text-[10px] px-2 py-1 rounded-full font-bold uppercase">Wira Perak</span>
                    <h3 id="rankText" class="font-bold text-lg mt-1">Lagi RM250 untuk jadi Wira Emas!</h3>
                </div>
                <div id="rankEmoji" class="text-4xl">🥈</div>
            </div>
            <div class="w-full bg-indigo-800 h-2 rounded-full mt-4 overflow-hidden">
                <div id="rankProgress" class="bg-yellow-400 h-full w-3/4 shadow-[0_0_15px_rgba(250,204,21,0.6)] transition-all duration-700"></div>
            </div>
        </section>

        <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h3 class="font-bold text-slate-800 mb-5 flex items-center gap-2 uppercase text-xs tracking-widest">
                <span class="bg-indigo-100 p-1 rounded">💰</span> Kalkulator SakuGig
            </h3>
            
            <div class="space-y-6">
                <div class="relative">
                    <label class="text-[10px] text-slate-400 font-black uppercase mb-1 block">Input Pendapatan (RM)</label>
                    <input type="number" id="incomeInput" value="1000" class="w-full text-3xl font-bold p-4 bg-slate-50 border-2 border-indigo-50 rounded-2xl focus:border-indigo-500 focus:bg-white focus:outline-none transition-all">
                </div>

                <div class="grid grid-cols-3 gap-4 pt-4 border-t border-slate-50 text-center">
                    <div>
                        <span class="text-[9px] font-bold text-slate-400 block uppercase">Simpanan</span>
                        <span class="font-bold text-indigo-600 text-sm" id="saveAmount">RM 150</span>
                    </div>
                    <div>
                        <span class="text-[9px] font-bold text-slate-400 block uppercase">Cukai</span>
                        <span class="font-bold text-orange-500 text-sm" id="taxAmount">RM 50</span>
                    </div>
                    <div>
                        <span class="text-[9px] font-bold text-slate-400 block uppercase">Baki</span>
                        <span class="font-bold text-green-600 text-sm" id="netAmount">RM 800</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h3 class="font-bold text-slate-800 mb-6 flex items-center gap-2 uppercase text-xs tracking-widest">
                <span class="bg-slate-100 p-1 rounded">📊</span> Visual Agihan
            </h3>
            <div class="flex items-end justify-around h-40 gap-6">
                <div class="flex flex-col items-center flex-1 h-full justify-end">
                    <div id="barSave" class="w-full bg-indigo-500 rounded-xl bar-transition shadow-lg shadow-indigo-100" style="height: 15%"></div>
                    <span class="text-[9px] mt-3 font-black text-slate-400 uppercase">Simpan</span>
                </div>
                <div class="flex flex-col items-center flex-1 h-full justify-end">
                    <div id="barTax" class="w-full bg-orange-400 rounded-xl bar-transition shadow-lg shadow-orange-100" style="height: 5%"></div>
                    <span class="text-[9px] mt-3 font-black text-slate-400 uppercase">Cukai</span>
                </div>
                <div class="flex flex-col items-center flex-1 h-full justify-end">
                    <div id="barNet" class="w-full bg-green-500 rounded-xl bar-transition shadow-lg shadow-green-100" style="height: 80%"></div>
                    <span class="text-[9px] mt-3 font-black text-slate-400 uppercase">Belanja</span>
                </div>
            </div>
        </section>

        <div class="flex items-center gap-3 overflow-x-auto py-2 no-scrollbar">
            <div class="flex-shrink-0 bg-white border border-slate-100 px-4 py-2 rounded-full flex items-center gap-2 shadow-sm animate-pulse">
                <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                <span class="text-[10px] font-bold text-slate-600">Wira Ahmad (Kangar) mencarum RM50!</span>
            </div>
            <div class="flex-shrink-0 bg-white border border-slate-100 px-4 py-2 rounded-full flex items-center gap-2 shadow-sm">
                <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
                <span class="text-[10px] font-bold text-slate-600">Wira Siti (JB) baru daftar SSM!</span>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-slate-100 p-4 max-w-md mx-auto flex justify-around shadow-lg">
        <button class="flex flex-col items-center text-indigo-600">
            <span class="text-xl">🏠</span>
            <span class="text-[9px] font-black uppercase mt-1">Utama</span>
        </button>
        <button class="flex flex-col items-center text-slate-400 hover:text-indigo-400">
            <span class="text-xl">🛡️</span>
            <span class="text-[9px] font-black uppercase mt-1">Guard</span>
        </button>
        <button class="flex flex-col items-center text-slate-400 hover:text-indigo-400">
            <span class="text-xl">💬</span>
            <span class="text-[9px] font-black uppercase mt-1">Sembang</span>
        </button>
    </nav>

    <script>
        const input = document.getElementById('incomeInput');
        const saveLabel = document.getElementById('saveAmount');
        const taxLabel = document.getElementById('taxAmount');
        const netLabel = document.getElementById('netAmount');
        
        const barSave = document.getElementById('barSave');
        const barTax = document.getElementById('barTax');
        const barNet = document.getElementById('barNet');

        const rankBadge = document.getElementById('rankBadge');
        const rankText = document.getElementById('rankText');
        const rankEmoji = document.getElementById('rankEmoji');
        const rankCard = document.getElementById('rankCard');
        const rankProgress = document.getElementById('rankProgress');

        let goalReached = false;

        input.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value) || 0;
            
            // Pengiraan
            const save = val * 0.15;
            const tax = val * 0.05;
            const net = val - (save + tax);

            // Kemaskini Teks
            saveLabel.innerText = `RM ${save.toFixed(0)}`;
            taxLabel.innerText = `RM ${tax.toFixed(0)}`;
            netLabel.innerText = `RM ${net.toFixed(0)}`;

            // Kemaskini Grafik Bar
            if (val > 0) {
                barSave.style.height = `30%`;
                barTax.style.height = `10%`;
                barNet.style.height = `90%`;
            } else {
                barSave.style.height = `0%`;
                barTax.style.height = `0%`;
                barNet.style.height = `0%`;
            }

            // Logik Pangkat (Gamification)
            if (save >= 500) {
                rankBadge.innerText = "Wira Emas 🏆";
                rankBadge.classList.replace('bg-indigo-500', 'bg-yellow-500');
                rankText.innerText = "Tahniah! Anda capai status Elit.";
                rankEmoji.innerText = "🥇";
                rankProgress.style.width = "100%";
                
                if (!goalReached) {
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#7c3aed', '#fbbf24', '#10b981']
                    });
                    goalReached = true;
                }
            } else {
                rankBadge.innerText = "Wira Perak";
                rankBadge.classList.replace('bg-yellow-500', 'bg-indigo-500');
                rankText.innerText = `Lagi RM${(500-save).toFixed(0)} untuk jadi Wira Emas!`;
                rankEmoji.innerText = "🥈";
                rankProgress.style.width = `${(save/500)*100}%`;
                goalReached = false;
            }
        });
    </script>
</body>
</html>
